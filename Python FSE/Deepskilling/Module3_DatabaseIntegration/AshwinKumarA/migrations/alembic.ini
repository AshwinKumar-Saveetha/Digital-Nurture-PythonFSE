# Alembic configuration for Hands-On 7 (Migrations & Versioning)
# Digital Nurture 5.0 - Module 3: Database Integration

[alembic]
# path to migration scripts (relative to this file's location)
script_location = %(here)s/.

# template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# sys.path path, prepended so `from models import Base` in env.py
# can find ../orm/models.py
prepend_sys_path = . ../orm

# timezone for rendered dates - left blank for localtime
# timezone =

# max length of the "slug" portion of generated filenames
truncate_slug_length = 40

# set to 'true' to run migrations env during 'revision', even
# without --autogenerate
# revision_environment = false

path_separator = os

# --------------------------------------------------------------
# Database connection used by Alembic.
# Points at college_db_orm (the same database orm/models.py uses),
# per the exercise book's Hands-On 7 instructions (Step 93).
# Update the username/password/host for your own environment.
# --------------------------------------------------------------
sqlalchemy.url = mysql+mysqlconnector://root:password@localhost:3306/college_db_orm


[post_write_hooks]
# Optional: auto-format generated migration files, e.g. with black
# or ruff. Left disabled by default.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
