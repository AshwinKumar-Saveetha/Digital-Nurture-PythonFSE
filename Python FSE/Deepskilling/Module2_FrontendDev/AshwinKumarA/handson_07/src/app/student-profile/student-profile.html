<main class="profile-page">
  <section class="profile-heading">
    <p class="section-label">Hands-On 07</p>
    <h1>Student Profile</h1>

    <p>
      Enter your student information using the Angular Reactive Form.
    </p>
  </section>

  <section class="form-section">
    <form
      class="profile-form"
      [formGroup]="profileForm"
      (ngSubmit)="onSubmit()"
      novalidate
    >
      <div class="form-field">
        <label for="student-name">
          Name
        </label>

        <input
          id="student-name"
          type="text"
          formControlName="name"
          placeholder="Enter your full name"
        />

        <p
          *ngIf="
            profileForm.controls.name.touched &&
            profileForm.controls.name.hasError('required')
          "
          class="error-message"
        >
          Name is required
        </p>
      </div>

      <div class="form-field">
        <label for="student-email">
          Email
        </label>

        <input
          id="student-email"
          type="email"
          formControlName="email"
          placeholder="Enter your email address"
        />

        <p
          *ngIf="
            profileForm.controls.email.touched &&
            profileForm.controls.email.hasError('required')
          "
          class="error-message"
        >
          Email is required
        </p>

        <p
          *ngIf="
            profileForm.controls.email.touched &&
            profileForm.controls.email.hasError('email')
          "
          class="error-message"
        >
          Enter a valid email
        </p>
      </div>

      <div class="form-field">
        <label for="student-semester">
          Semester
        </label>

        <input
          id="student-semester"
          type="number"
          formControlName="semester"
          min="1"
          max="8"
          placeholder="Enter semester from 1 to 8"
        />

        <p
          *ngIf="
            profileForm.controls.semester.touched &&
            profileForm.controls.semester.hasError('required')
          "
          class="error-message"
        >
          Semester is required
        </p>

        <p
          *ngIf="
            profileForm.controls.semester.touched &&
            (
              profileForm.controls.semester.hasError('min') ||
              profileForm.controls.semester.hasError('max')
            )
          "
          class="error-message"
        >
          Semester must be between 1 and 8
        </p>
      </div>

      <button
        type="submit"
        [disabled]="profileForm.invalid"
      >
        Submit Profile
      </button>
    </form>
  </section>
</main>
