<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Portal</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h2 class="site-title">Student Portal</h2>

        <p class="menu-placeholder">☰ Menu</p>

        <nav>
            <ul>
                <li><a href="#hero">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Welcome to the Student Portal</h1>

            <p>
                View your courses, profile, grades and academic information.
            </p>

            <button type="button" id="explore-courses">
                Explore Courses
            </button>
        </section>

        <section class="student-stats">
            <div class="stat-item">
                <h3>Courses Enrolled</h3>
                <p>5</p>
            </div>

            <div class="stat-item">
                <h3>GPA</h3>
                <p>3.8</p>
            </div>

            <div class="stat-item">
                <h3>Semester</h3>
                <p>6</p>
            </div>
        </section>

        <section id="courses">
            <h2>My Courses</h2>

            <div class="course-controls">
                <input
                    type="text"
                    id="search-courses"
                    placeholder="Search courses..."
                    autocomplete="off"
                >

                <button type="button" id="sort-credits">
                    Sort by Credits
                </button>
            </div>

            <div class="course-grid"></div>

            <p id="total-credits"></p>

            <div id="selected-course">
                Select a course card to view its grade.
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Portal | Ashwin Kumar A</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
